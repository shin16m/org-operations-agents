# Extended workflow: default v3 + work (task execution — deprecated)
# default v3 の全段階 + work（過渡期 task-executor）
id: with-execution
version: "2"
description: intake → bootstrap → dispatch → work（deprecated）

policy:
  review_required: false
  entry_step: intake
  entry_agent: workflow-orchestrator
  note: 企画は planning-delivery。task-executor は過渡期のみ

steps:
  - id: intake
    agent: workflow-orchestrator
    gate_after: null

  - id: bootstrap
    agent: asana-buddy
    gate_after: null

  - id: dispatch
    agent: task-dispatcher
    gate_after: null
    reads:
      - workflows/organizations.yaml

  - id: work
    agent: task-executor
    role: サブタスク実行（deprecated）
    gate_after: null

gates: {}
