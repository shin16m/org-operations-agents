# Department → workflow routing.
# Consumed by task-dispatcher. New departments: see docs/design/department-model.md
version: "2"

departments:
  - id: planning
    label: 企画チーム
    workflow_id: planning-delivery
    entry_agent: planning-pm
    skill_root: skills/planning
    output_root: output/planning
    delivery_io_doc: docs/design/planning-delivery-io.md
    enabled: true

  - id: development
    label: 開発チーム
    workflow_id: development-delivery
    entry_agent: product-manager
    skill_root: skills/development
    output_root: output/development
    delivery_io_doc: docs/design/development-delivery-io.md
    enabled: true

  - id: analysis
    label: 分析チーム
    workflow_id: analysis-delivery
    entry_agent: analytics-pm
    skill_root: skills/analysis
    output_root: output/analysis
    delivery_io_doc: docs/design/analysis-delivery-io.md
    enabled: true

  - id: ux
    label: UX チーム
    workflow_id: ux-delivery
    entry_agent: ux-pm
    skill_root: skills/ux
    output_root: output/ux
    delivery_io_doc: docs/design/ux-delivery-io.md
    enabled: true

# 統括グループ（registry 参照用・dispatch 対象外）
coordination_group:
  id: coordination
  label: 統括グループ
  skill_root: skills/platform
  output_root: output/platform
  note: intake / bootstrap / dispatch / Asana CRUD / メタ。チーム内 delivery には入らない。

# pillar（Handoff v1.2 未設定時）→ department ヒューリスティック
pillar_defaults:
  - match: ["実装", "開発チーム", "開発チーム", "検証・開発チーム", "検証・開発チーム", "整備・開発チーム", "整備・開発チーム"]
    department: development
  - match: ["UX", "UI", "画面", "体験", "Design System", "ワイヤー", "Figma"]
    department: ux
  - match: ["分析", "分析チーム", "データ", "ETL", "モデル", "ML", "ダッシュボード", "KPI"]
    department: analysis
  - match: ["設計", "方針", "整備", "検証", "企画", "企画チーム"]
    department: planning
