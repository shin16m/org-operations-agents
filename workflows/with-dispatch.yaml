# Extended workflow: default v3 + post-planning child dispatch loop
# 企画完了後、オーケストレーターが execution 系子を dev/analysis へ順次 dispatch
id: with-dispatch
version: "2"
description: intake → bootstrap → dispatch（企画）→ … 実行系子 dispatch

policy:
  review_required: false
  entry_step: intake
  entry_agent: workflow-orchestrator
  dispatch_unit: single_subtask
  note: L1 企画は planning-delivery。execute 系子は企画完了後に L2 dispatch ループ

steps:
  - id: intake
    agent: workflow-orchestrator
    gate_after: null

  - id: bootstrap
    agent: asana-buddy
    gate_after: null

  - id: dispatch
    agent: task-dispatcher
    role: 最初は department=planning。企画完了後は orchestrator が dev/analysis 子を順次 dispatch
    gate_after: null
    reads:
      - workflows/organizations.yaml

gates: {}
