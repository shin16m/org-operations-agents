# Agent registry. 新規 slug の実体は agent-creater で作成してから登録する。
version: "2"

agents:
  - slug: workflow-orchestrator
    slot: orchestrate
    skill_path: skills/platform/workflow-orchestrator
    enabled: true
    workflow_steps: [intake, bootstrap, dispatch]
    io:
      intake_input: raw_request（自然言語）
      bootstrap_input: 最小 Handoff（企画子 1 件）
      reads:
        - workflows/default.yaml
        - workflows/with-dispatch.yaml
        - workflows/organizations.yaml
        - workflows/planning-delivery.yaml
        - workflows/agent-registry.yaml
      session_doc: docs/design/workflow-session-io.md

  - slug: planning-pm
    slot: dept_orchestrate
    skill_path: skills/planning/planning-pm
    enabled: true
    workflow_steps: []
    io:
      input_kind: DispatchRequest
      output_kind: DeptWorkComplete
      output_schema: skills/development/product-manager/schemas/dept-work-complete.v1.schema.json
      schema_doc: docs/design/planning-delivery-io.md
      reads:
        - workflows/planning-delivery.yaml

  - slug: issue-story-planner
    slot: dept_work
    skill_path: skills/planning/issue-story-planner
    enabled: true
    note: planning-pm から委譲。Handoff JSON を出力
    io:
      input_kind: asana_subtask_notes
      output_schema: skills/planning/issue-story-planner/schemas/asana-buddy-handoff.v1.schema.json
      output_kind: AsanaBuddyHandoff
      schema_version: "1.1"
      schema_doc: docs/design/planning-delivery-io.md
      artifact_root: output/planning/handoff/
      reads:
        - workflows/planning-delivery.yaml

  - slug: plan-reviewer
    slot: dept_review
    skill_path: skills/planning/plan-reviewer
    enabled: true
    note: planning-pm から委譲。企画 Handoff の品質ゲート
    io:
      input_kind: AsanaBuddyHandoff
      output_kind: PlanReviewResult
      output_schema: skills/planning/plan-reviewer/schemas/plan-review-result.v1.schema.json
      schema_version: "1.0"
      schema_doc: docs/design/plan-reviewer-contract.md

  - slug: asana-buddy
    slot: execute
    skill_path: skills/platform/asana-buddy
    enabled: true
    io:
      input_kind: AsanaBuddyHandoff
      schema_version: "1.1"
      script: skills/platform/asana-buddy/optional/handoff_to_asana.py
      task_read_script: skills/platform/asana-buddy/optional/fetch_task.py
      task_comment_script: skills/platform/asana-buddy/optional/comment_task.py
      task_complete_script: skills/platform/asana-buddy/optional/complete_task.py
      comment_schema: skills/platform/asana-buddy/schemas/agent-work-comment.v1.schema.json
      comment_doc: docs/design/agent-asana-comment-signature.md

  - slug: task-dispatcher
    slot: dispatch
    skill_path: skills/platform/task-dispatcher
    enabled: true
    workflow_steps: [dispatch]
    io:
      input_kind: DispatchRequest
      input_schema: skills/platform/task-dispatcher/schemas/dispatch-request.v1.schema.json
      schema_version: "1.0"
      schema_doc: docs/design/dept-work-io.md
      reads:
        - workflows/with-dispatch.yaml
        - workflows/organizations.yaml

  - slug: product-manager
    slot: dept_orchestrate
    skill_path: skills/development/product-manager
    enabled: true
    workflow_steps: []
    io:
      input_kind: DispatchRequest
      output_kind: DeptWorkComplete
      output_schema: skills/development/product-manager/schemas/dept-work-complete.v1.schema.json
      schema_doc: docs/design/development-delivery-io.md
      reads:
        - workflows/development-delivery.yaml

  - slug: requirements-writer
    slot: dept_work
    skill_path: skills/development/requirements-writer
    enabled: true
    note: development-delivery v2 — 要件・事後仕様
    io:
      input_kind: asana_subtask_notes
      schema_doc: docs/design/development-delivery-io.md
      artifact_root: output/development/
      reads:
        - workflows/development-delivery.yaml

  - slug: tech-designer
    slot: dept_work
    skill_path: skills/development/tech-designer
    enabled: true
    note: development-delivery v2 — 実装前設計
    io:
      input_kind: asana_subtask_notes
      schema_doc: docs/design/development-delivery-io.md
      artifact_root: output/development/
      reads:
        - workflows/development-delivery.yaml

  - slug: developer
    slot: dept_work
    skill_path: skills/development/developer
    enabled: true
    io:
      input_kind: asana_subtask_notes
      schema_doc: docs/design/development-delivery-io.md
      artifact_root: output/development/
      reads:
        - workflows/development-delivery.yaml

  - slug: dev-reviewer
    slot: dept_review
    skill_path: skills/development/dev-reviewer
    enabled: true
    io:
      output_schemas:
        - skills/development/dev-reviewer/schemas/doc-review-result.v1.schema.json
        - skills/development/dev-reviewer/schemas/code-review-result.v1.schema.json
        - skills/development/dev-reviewer/schemas/mismatch-review-result.v1.schema.json

  - slug: qa-verifier
    slot: dept_review
    skill_path: skills/development/qa-verifier
    enabled: true
    io:
      output_schemas:
        - skills/development/qa-verifier/schemas/verification-result.v1.schema.json

  - slug: ux-pm
    slot: dept_orchestrate
    skill_path: skills/ux/ux-pm
    enabled: true
    note: ux-delivery — 必須サブタスク分解・アサイン（analytics-pm 同等）
    workflow_steps: []
    io:
      input_kind: DispatchRequest
      output_kind: DeptWorkComplete
      output_schema: skills/development/product-manager/schemas/dept-work-complete.v1.schema.json
      schema_doc: docs/design/ux-delivery-io.md
      reads:
        - workflows/ux-delivery.yaml

  - slug: ux-designer
    slot: dept_work
    skill_path: skills/ux/ux-designer
    enabled: true
    note: ux-delivery v1 — 体験設計・Design System
    io:
      input_kind: asana_subtask_notes
      schema_doc: docs/design/ux-delivery-io.md
      artifact_root: output/ux/
      reads:
        - workflows/ux-delivery.yaml

  - slug: ux-reviewer
    slot: dept_review
    skill_path: skills/ux/ux-reviewer
    enabled: true
    note: ux_spec + development full-ui ux_implementation
    io:
      output_schemas:
        - skills/ux/ux-reviewer/schemas/ux-review-result.v1.schema.json

  - slug: analytics-pm
    slot: dept_orchestrate
    skill_path: skills/analysis/analytics-pm
    enabled: true
    workflow_steps: []
    io:
      input_kind: DispatchRequest
      output_kind: DeptWorkComplete
      output_schema: skills/development/product-manager/schemas/dept-work-complete.v1.schema.json
      schema_doc: docs/design/analysis-delivery-io.md
      reads:
        - workflows/analysis-delivery.yaml

  - slug: data-architect
    slot: dept_work
    skill_path: skills/analysis/data-architect
    enabled: true
    io:
      input_kind: asana_subtask_notes
      schema_doc: docs/design/analysis-delivery-io.md
      artifact_root: output/analysis/
      reads:
        - workflows/analysis-delivery.yaml

  - slug: data-engineer
    slot: dept_work
    skill_path: skills/analysis/data-engineer
    enabled: true
    io:
      input_kind: asana_subtask_notes
      schema_doc: docs/design/analysis-delivery-io.md
      artifact_root: output/analysis/
      reads:
        - workflows/analysis-delivery.yaml

  - slug: data-steward
    slot: dept_work
    skill_path: skills/analysis/data-steward
    enabled: true
    io:
      input_kind: asana_subtask_notes
      schema_doc: docs/design/analysis-delivery-io.md
      artifact_root: output/analysis/
      reads:
        - workflows/analysis-delivery.yaml

  - slug: data-analyst
    slot: dept_work
    skill_path: skills/analysis/data-analyst
    enabled: true
    io:
      input_kind: asana_subtask_notes
      schema_doc: docs/design/analysis-delivery-io.md
      artifact_root: output/analysis/
      reads:
        - workflows/analysis-delivery.yaml

  - slug: data-scientist
    slot: dept_work
    skill_path: skills/analysis/data-scientist
    enabled: true
    io:
      input_kind: asana_subtask_notes
      schema_doc: docs/design/analysis-delivery-io.md
      artifact_root: output/analysis/
      reads:
        - workflows/analysis-delivery.yaml

  - slug: ml-engineer
    slot: dept_work
    skill_path: skills/analysis/ml-engineer
    enabled: true
    io:
      input_kind: asana_subtask_notes
      schema_doc: docs/design/analysis-delivery-io.md
      artifact_root: output/analysis/
      reads:
        - workflows/analysis-delivery.yaml

  - slug: analysis-reviewer
    slot: dept_review
    skill_path: skills/analysis/analysis-reviewer
    enabled: true
    io:
      output_schemas:
        - skills/analysis/analysis-reviewer/schemas/analysis-doc-review-result.v1.schema.json
        - skills/analysis/analysis-reviewer/schemas/deploy-gate-result.v1.schema.json
        - skills/development/qa-verifier/schemas/verification-result.v1.schema.json

  - slug: agent-creater
    slot: meta
    skill_path: skills/platform/agent-creater
    enabled: true
    note: 新規 skills/<organization>/<slug>/ の唯一の生成入口。workflow の段階には載せない。
