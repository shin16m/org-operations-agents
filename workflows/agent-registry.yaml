# Agent registry. 新規 slug の実体は agent-creater で作成してから登録する。
version: "2"

agents:
  - slug: workflow-orchestrator
    slot: orchestrate
    skill_path: skills/workflow-orchestrator
    enabled: true
    workflow_steps: [intake, gate]
    io:
      intake_input: raw_request（自然言語）
      gate_input: AsanaBuddyHandoff + PlanReviewResult
      reads:
        - workflows/default.yaml
        - workflows/with-execution.yaml
        - workflows/with-dispatch.yaml
        - workflows/organizations.yaml
        - workflows/agent-registry.yaml
      session_doc: docs/design/workflow-session-io.md

  - slug: issue-story-planner
    slot: plan
    skill_path: skills/issue-story-planner
    enabled: true
    note: 通常は orchestrator（intake）から委譲されて起動する
    io:
      output_schema: skills/issue-story-planner/schemas/asana-buddy-handoff.v1.schema.json
      output_kind: AsanaBuddyHandoff
      schema_version: "1.1"

  - slug: plan-reviewer
    slot: review
    skill_path: skills/plan-reviewer
    enabled: true
    io:
      input_kind: AsanaBuddyHandoff
      output_kind: PlanReviewResult
      output_schema: skills/plan-reviewer/schemas/plan-review-result.v1.schema.json
      schema_version: "1.0"
      schema_doc: docs/design/plan-reviewer-contract.md

  - slug: asana-buddy
    slot: execute
    skill_path: skills/asana-buddy
    enabled: true
    io:
      input_kind: AsanaBuddyHandoff
      schema_version: "1.1"
      script: skills/asana-buddy/optional/handoff_to_asana.py
      task_read_script: skills/asana-buddy/optional/fetch_task.py
      task_comment_script: skills/asana-buddy/optional/comment_task.py
      task_complete_script: skills/asana-buddy/optional/complete_task.py
      comment_schema: skills/asana-buddy/schemas/agent-work-comment.v1.schema.json
      comment_doc: docs/design/agent-asana-comment-signature.md

  - slug: task-executor
    slot: work
    skill_path: skills/task-executor
    enabled: true
    deprecated: true
    note: 過渡期。新規は task-dispatcher + 課 workflow を使用
    workflow_steps: [work]
    io:
      input_kind: TaskWorkRequest
      output_kind: TaskWorkResult
      input_schema: skills/task-executor/schemas/task-work-request.v1.schema.json
      output_schema: skills/task-executor/schemas/task-work-result.v1.schema.json
      schema_version: "1.0"
      schema_doc: docs/design/task-work-io.md
      boundary_doc: docs/design/task-execution-boundary.md
      reads:
        - workflows/with-execution.yaml

  - slug: task-dispatcher
    slot: dispatch
    skill_path: skills/task-dispatcher
    enabled: true
    workflow_steps: [dispatch]
    io:
      input_kind: DispatchRequest
      input_schema: skills/task-dispatcher/schemas/dispatch-request.v1.schema.json
      schema_version: "1.0"
      schema_doc: docs/design/dept-work-io.md
      reads:
        - workflows/with-dispatch.yaml
        - workflows/organizations.yaml

  - slug: product-manager
    slot: dept_orchestrate
    skill_path: skills/product-manager
    enabled: true
    workflow_steps: []
    io:
      input_kind: DispatchRequest
      output_kind: DeptWorkComplete
      output_schema: skills/product-manager/schemas/dept-work-complete.v1.schema.json
      schema_doc: docs/design/dept-work-io.md
      reads:
        - workflows/development-delivery.yaml

  - slug: doc-writer
    slot: dept_work
    skill_path: skills/doc-writer
    enabled: true

  - slug: developer
    slot: dept_work
    skill_path: skills/developer
    enabled: true

  - slug: reviewer
    slot: dept_review
    skill_path: skills/reviewer
    enabled: true
    io:
      output_schemas:
        - skills/reviewer/schemas/doc-review-result.v1.schema.json
        - skills/reviewer/schemas/code-review-result.v1.schema.json
        - skills/reviewer/schemas/verification-result.v1.schema.json
        - skills/reviewer/schemas/mismatch-review-result.v1.schema.json

  - slug: analytics-pm
    slot: dept_orchestrate
    skill_path: skills/analytics-pm
    enabled: true
    workflow_steps: []
    io:
      input_kind: DispatchRequest
      output_kind: DeptWorkComplete
      output_schema: skills/product-manager/schemas/dept-work-complete.v1.schema.json
      schema_doc: docs/design/analysis-delivery-io.md
      reads:
        - workflows/analysis-delivery.yaml

  - slug: data-architect
    slot: dept_work
    skill_path: skills/data-architect
    enabled: true

  - slug: data-engineer
    slot: dept_work
    skill_path: skills/data-engineer
    enabled: true

  - slug: data-steward
    slot: dept_work
    skill_path: skills/data-steward
    enabled: true

  - slug: data-analyst
    slot: dept_work
    skill_path: skills/data-analyst
    enabled: true

  - slug: data-scientist
    slot: dept_work
    skill_path: skills/data-scientist
    enabled: true

  - slug: ml-engineer
    slot: dept_work
    skill_path: skills/ml-engineer
    enabled: true

  - slug: analysis-reviewer
    slot: dept_review
    skill_path: skills/analysis-reviewer
    enabled: true
    io:
      output_schemas:
        - skills/analysis-reviewer/schemas/analysis-doc-review-result.v1.schema.json
        - skills/analysis-reviewer/schemas/deploy-gate-result.v1.schema.json
        - skills/reviewer/schemas/verification-result.v1.schema.json

  - slug: agent-creater
    slot: meta
    skill_path: skills/agent-creater
    enabled: true
    note: 新規 skills/<slug>/ の唯一の生成入口。workflow の段階には載せない。
