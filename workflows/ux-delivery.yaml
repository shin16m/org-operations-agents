# UX department workflow v1 — one instance per Asana subtask.
# ux-pm hub; experience design before downstream development full-ui consume.
id: ux-delivery
version: "1"
description: PM-led UX delivery (experience spec → design system → review → publish artifacts)

policy:
  scope: single_subtask
  entry_agent: ux-pm
  parent_context: read_parent_epic_notes
  operational_rules_doc: docs/design/ux-delivery-io.md
  assignment_doc: docs/design/ux-pm-assignment.md

steps:
  - id: pm_intake
    agent: ux-pm
    role: 子 notes を読み、必要タスクを洗い出し、サブタスク作成と担当アサイン（必須）

  - id: pm_assign
    agent: ux-pm
    role: pm_assign_subtasks / update_task_notes で各サブに 担当: を設定

  - id: ux_design
    agent: ux-designer
    role: 委譲サブタスク上で体験設計書または Design System を作成
    artifact: ux-spec

  - id: ux_spec_review
    agent: ux-reviewer
    role: 委譲サブタスク上で体験設計・a11y・要件充足レビュー
    review_kind: ux_spec
    gate_after: ux_review_passed

  - id: pm_publish
    agent: ux-pm
    role: DeptWorkComplete（artifacts[]）・notes 用参照を確定

  - id: pm_complete
    agent: ux-pm
    role: comment_task → complete_task -y

gates:
  ux_review_passed:
    description: UxReviewResult status passed*（review_kind ux_spec）
