# Default workflow — orchestrator intake entry (v6)
# v5: suspend / resume（org-os）— RETIRED 2026-06-09
# v6: チャット入口のみ（chat-driven-ops SSOT）
id: default
version: "6"
description: 和久桶さんチャット intake → bootstrap Handoff → dispatch（企画チーム）

policy:
  review_required: false
  entry_step: intake
  entry_agent: workflow-orchestrator
  note: 本番入口はチャットのみ。plan/review/gate/asana 投入は planning-delivery（L3 企画チーム）

steps:
  - id: intake
    agent: workflow-orchestrator
    role: 課題受付（自然言語 · チャット）。任意で Asana URL を手動参照
    gate_after: null

  - id: triage
    agent: workflow-orchestrator
    role: 任意 — intake-asana 時のみ snapshot → epic_input JSON
    gate_after: null
    outputs:
      - output/platform/triage/<source_gid>-epic-input.json

  - id: bootstrap
    agent: asana-buddy
    role: bootstrap Handoff を Asana に投入（親 + 企画子 1 件）。入口はチャット（自動検出なし）
    gate_after: null

  - id: dispatch
    agent: task-dispatcher
    role: 企画子を planning-delivery へルーティング
    gate_after: null
    reads:
      - workflows/organizations.yaml

gates: {}
