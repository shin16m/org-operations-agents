# Default workflow for agent-create-supporter
id: default
version: "1"
description: plan → review（必須）→ orchestrate → execute

policy:
  review_required: true  # plan-reviewer による review 段階を省略不可（人間レビューのみでは不可）

steps:
  - id: plan
    agent: issue-story-planner
    gate_after: null

  - id: review
    agent: plan-reviewer
    required: true
    gate_after: review_passed

  - id: orchestrate
    agent: workflow-orchestrator
    gate_after: handoff_approved

  - id: execute
    agent: asana-buddy
    gate_after: null

gates:
  review_passed:
    description: plan-reviewer の PlanReviewResult が passed または passed_with_notes（必須段階）
    blocks: [orchestrate, execute]
  handoff_approved:
    description: 利用者が execute 段階へ進行を確認
