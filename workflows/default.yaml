# Default workflow — orchestrator intake entry (v2)
# 変更: v1 は plan 先頭。v2 から intake → plan → review → gate → execute。
id: default
version: "2"
description: intake → plan → review（必須）→ gate → execute

policy:
  review_required: true
  entry_step: intake
  entry_agent: workflow-orchestrator

steps:
  - id: intake
    agent: workflow-orchestrator
    role: 課題受付。plan へ委譲プロンプトを返す
    gate_after: null

  - id: plan
    agent: issue-story-planner
    gate_after: null

  - id: review
    agent: plan-reviewer
    required: true
    gate_after: review_passed

  - id: gate
    agent: workflow-orchestrator
    role: review 後。handoff_approved を確認し execute へ
    gate_after: handoff_approved

  - id: execute
    agent: asana-buddy
    gate_after: null

gates:
  review_passed:
    description: plan-reviewer の PlanReviewResult が passed または passed_with_notes
    blocks: [gate, execute]
  handoff_approved:
    description: gate 段階で利用者が execute へ進行を確認
