# Default workflow — orchestrator intake entry (v3)
# v2: intake → plan → review → gate → execute（L1 完結）
# v3: 企画（plan/review/gate/execute）を planning-delivery（L3）へ移管
id: default
version: "3"
description: intake → bootstrap → dispatch（企画チームへ最初の配賦）

policy:
  review_required: false
  entry_step: intake
  entry_agent: workflow-orchestrator
  note: plan/review/gate/asana 投入は planning-delivery（L3 企画チーム）で実行

steps:
  - id: intake
    agent: workflow-orchestrator
    role: 課題受付。bootstrap 用最小 Handoff（企画子 1 件）を生成
    gate_after: null

  - id: bootstrap
    agent: asana-buddy
    role: 親 + 企画子タスク 1 件を Asana に作成（dispatch 可能にする）
    gate_after: null

  - id: dispatch
    agent: task-dispatcher
    role: 企画子タスクを planning-delivery へルーティング
    gate_after: null
    reads:
      - workflows/organizations.yaml

gates: {}
