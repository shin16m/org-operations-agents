# Analysis department workflow v2 — one instance per Asana subtask.
# analytics-pm hub; profile-driven phase selection; PM does not write worker artifacts.
id: analysis-delivery
version: "2"
description: PM-led analytics delivery with profiles (requirements → data → pipeline → quality → insights → model → deploy → value)

policy:
  scope: single_subtask
  entry_agent: analytics-pm
  parent_context: read_parent_epic_notes
  operational_rules_doc: docs/design/analysis-delivery-io.md
  assignment_doc: docs/design/analytics-pm-assignment.md
  dispatch_prompt_ssot: docs/design/dispatch-prompt-ssot.md#analysis
  review_rework_ssot: docs/design/pm-review-rework-ssot.md
  artifact_bridge_doc: docs/design/cross-team-artifact-bridge.md
  pm_role: orchestrate_only

steps:
  - id: pm_intake
    agent: analytics-pm
    role: 子 notes を読み、delivery profile を決定し、pm_assign_subtasks でサブタスク分解

  - id: pm_review_gate
    agent: "{department}-pm"
    role: "opt-in のみ create_pm_review_gate → 人間 complete → check exit 0"
    optional: true
    when: human_review_gate

  - id: requirements
    agent: analytics-requirements-writer
    role: 分析要件書（KPI・受け入れ基準）
    artifact: analytics-requirements-doc
    writer_mode: requirements

  - id: requirements_review
    agent: analysis-reviewer
    role: 要件書レビュー
    review_kind: analytics_requirements
    gate_after: requirements_review_passed

  - id: data_design
    agent: data-architect
    role: データモデル・SLA（更新頻度・遅延許容）設計
    artifact: data-model-doc
    skip_when_profile: lite

  - id: data_design_review
    agent: analysis-reviewer
    role: データモデル・SLA レビュー
    review_kind: data_model
    gate_after: data_model_review_passed
    skip_when_profile: lite

  - id: etl_pipeline
    agent: data-engineer
    role: パイプライン構築・テスト
    artifact: pipeline-code
    skip_when_profile: [insights, catalog, lite]

  - id: pipeline_review
    agent: analysis-reviewer
    role: パイプライン review
    review_kind: pipeline
    gate_after: pipeline_review_passed
    skip_when_profile: [insights, catalog, lite]

  - id: quality_governance
    agent: data-steward
    role: 品質ルール・カタログ・コンプライアンス
    artifact: data-catalog-quality-report
    skip_when_profile: lite

  - id: quality_review
    agent: analysis-reviewer
    role: 品質 review
    review_kind: data_quality
    gate_after: quality_review_passed
    skip_when_profile: lite

  - id: exploration
    agent: data-analyst
    role: 探索・ダッシュボード・インサイト
    artifact: analysis-notes-dashboard
    skip_when_profile: [model-serve, catalog, lite]

  - id: exploration_review
    agent: analysis-reviewer
    role: 分析成果 review
    review_kind: analysis_insights
    gate_after: exploration_review_passed
    skip_when_profile: [model-serve, catalog, lite]

  - id: model_development
    agent: data-scientist
    role: モデル試作・評価・モデルカード
    artifact: model-eval-report
    skip_when_profile: [insights, catalog, lite]

  - id: model_review
    agent: analysis-reviewer
    role: モデル review
    review_kind: model_eval
    gate_after: model_review_passed
    skip_when_profile: [insights, catalog, lite]

  - id: production_gate
    agent: analysis-reviewer
    role: 本番デプロイ前ゲート（ml-engineer 前必須）
    review_kind: production_deploy_gate
    gate_after: production_gate_passed
    skip_when_profile: [insights, catalog, lite]

  - id: deploy_ops
    agent: ml-engineer
    role: デプロイ・監視・再学習パイプライン
    artifact: deployed-model-monitoring
    skip_when_profile: [insights, catalog, lite]

  - id: deploy_verification
    agent: analysis-reviewer
    role: デプロイ検証
    review_kind: deploy_verification
    gate_after: deploy_verification_passed
    skip_when_profile: [insights, catalog, lite]

  - id: release_report
    agent: analytics-requirements-writer
    role: リリースノート・KPI レポート
    artifact: release-notes-kpi-report
    writer_mode: release
    skip_when_profile: lite

  - id: pm_complete
    agent: analytics-pm
    role: DeptWorkComplete · comment_task → complete_task -y

gates:
  requirements_review_passed:
    description: AnalysisDocReviewResult passed*（analytics_requirements）
  data_model_review_passed:
    description: AnalysisDocReviewResult passed*（data_model）。SLA 明文化必須
  pipeline_review_passed:
    description: AnalysisDocReviewResult passed*（pipeline）
  quality_review_passed:
    description: AnalysisDocReviewResult passed*（data_quality）
  exploration_review_passed:
    description: AnalysisDocReviewResult passed*（analysis_insights）
  model_review_passed:
    description: AnalysisDocReviewResult passed*（model_eval）
  production_gate_passed:
    description: DeployGateResult。quality_approved かつ security_approved 必須
  deploy_verification_passed:
    description: VerificationResult passed（deploy_verification）

branches:
  production_gate_blocked:
    from: production_gate
    when: status == failed
    to: model_development
    note: PM が修正サブを新規作成
