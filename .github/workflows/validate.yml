name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  registry:
    name: organization registry consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: pip install -r tools/requirements-validate.txt

      - name: Run validate_org_registry.py
        env:
          PYTHONIOENCODING: utf-8
        run: python tools/validate_org_registry.py

      - name: Run validate_fixture_schemas.py
        env:
          PYTHONIOENCODING: utf-8
        run: python tools/validate_fixture_schemas.py

      - name: Run validate_ssot_contract.py
        env:
          PYTHONIOENCODING: utf-8
        run: python tools/validate_ssot_contract.py

      - name: Run check_new_department.py --all
        env:
          PYTHONIOENCODING: utf-8
        run: python tools/check_new_department.py --all

      - name: Run check_new_skill.py --all-enabled
        env:
          PYTHONIOENCODING: utf-8
        run: python tools/check_new_skill.py --all-enabled

  org-os:
    name: org-os package tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install org-os with dev dependencies
        run: pip install -e "./products/org-os[dev]"

      - name: Run pytest
        env:
          PYTHONIOENCODING: utf-8
        run: pytest products/org-os/tests -q

      - name: Run org-os integration smoke test
        env:
          PYTHONIOENCODING: utf-8
        run: python tools/test_org_os_integration.py -v
